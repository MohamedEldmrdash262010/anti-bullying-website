<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="st.css">
    <title>Sign Up</title>
</head>
<body>
    <div class="container">
        <form action="#" class="form" id="form1">
            <h2 class="form__title">Sign Up</h2>
            <div class="form-group">
                <input type="text" id="username" placeholder="Username" class="input" />
                <span id="usernameError" class="error-message"></span>
            </div>
            <div class="form-group">
                <input type="email" id="email" placeholder="Email" class="input" />
                <span id="emailError" class="error-message"></span>
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Password" class="input" />
                <span id="passwordError" class="error-message"></span>
            </div>
            <button type="button" class="btn" id="submitButton">Sign Up</button>
        </form>
    </div>

    <script>
        document.getElementById('submitButton').addEventListener('click', function() {
            let valid = true;

            // Clear previous errors
            document.querySelectorAll('.error-message').forEach(el => el.textContent = '');

            // Validate Username
            const username = document.getElementById('username');
            if (!username.value.trim()) {
                document.getElementById('usernameError').textContent = 'Username is required.';
                valid = false;
            }

            // Validate Email
            const email = document.getElementById('email');
            if (!email.value.trim()) {
                document.getElementById('emailError').textContent = 'Email is required.';
                valid = false;
            } else if (!validateEmail(email.value)) {
                document.getElementById('emailError').textContent = 'Invalid email format.';
                valid = false;
            }

            // Validate Password
            const password = document.getElementById('password');
            if (!password.value.trim()) {
                document.getElementById('passwordError').textContent = 'Password is required.';
                valid = false;
            } else if (password.value.length < 6) {
                document.getElementById('passwordError').textContent = 'Password must be at least 6 characters long.';
                valid = false;
            }

            if (valid) {
                // Redirect to the desired URL if validation passes
                window.location.href = 'Eldmrdash Web/Eldmrdash Web.html';
            }
        });

        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(String(email).toLowerCase());
        }
    </script>
</body>
</html>
