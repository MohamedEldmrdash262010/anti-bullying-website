<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login or Sign Up</title>
    <style>
/* Reset CSS */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Body Styling */
body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(120deg, #2980B9, #6DD5FA);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #333;
    text-align: center;
}

/* Container Styling */
.container {
    background: #fff;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0px 15px 20px rgba(0, 0, 0, 0.1);
    max-width: 400px;
    width: 100%;
}

/* Title Styling */
h1 {
    font-size: 2.5rem;
    margin-bottom: 20px;
    color: #2980B9;
}

/* Button Styling */
button {
    display: block;
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    font-size: 1.2rem;
    color: white;
    background: #2980B9;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: 0.3s ease, transform 0.2s ease;
}

button:hover {
    background: #6DD5FA;
    transform: scale(1.05);
}

/* Link Styling */
a {
    text-decoration: none;
    color: white;
    font-weight: bold;
}

a:hover {
    text-decoration: underline;
}

    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome</h1>
        <button class="login-button" onclick="window.location.href='sign in.html'">Login</button>
        <button class="signup-button" onclick="window.location.href='sign up.html'">Sign Up</button>
    </div>
</body>
</html>
